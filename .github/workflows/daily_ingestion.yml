name: Daily Mutual Fund Ingestion Pipeline

on:
  push:
    branches:
      - main
  schedule:
    # 10:30 AM IST (UTC+05:30) corresponds to 05:00 UTC daily
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-ingestion:
    name: Run Daily Ingestion & Update Corpus
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ingestion Orchestrator
        run: |
          python scripts/trigger_ingestion.py

      - name: Commit and Push Updated Corpus & Vector Store
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ vectorstore/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(ingestion): daily corpus & vectorstore update [skip ci]"
            git push
          fi
